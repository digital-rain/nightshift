name: nightshift

on:
  schedule:
    - cron: "0 14 * * 1-5"   # 00:00 ChST (UTC+10) — runs ahead of janitors at 02:00
  workflow_dispatch:
    inputs:
      task:
        description: "Run a single task file (e.g. '10.hello') regardless of cap"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  plan:
    if: vars.NIGHTSHIFT_ENABLED == 'true' || (github.event_name == 'workflow_dispatch' && inputs.task != '')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      empty:  ${{ steps.build.outputs.empty }}
    steps:
      - uses: actions/checkout@v4

      - id: build
        env:
          GH_TOKEN: ${{ github.token }}
          ONLY_TASK: ${{ inputs.task }}
        run: |
          cfg=tools/nightshift/config.json
          cap=$(jq -r '.max_per_day' "$cfg")
          park=$(jq -r '.max_nights_before_parking' "$cfg")

          # Budget: max_per_day minus PRs created in trailing 24h
          since=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          recent=$(gh pr list --label nightshift --state all \
                     --search "created:>=${since}" --json number --jq 'length')
          budget=$(( cap - recent )); [ "$budget" -lt 0 ] && budget=0
          echo "nightly cap=$cap recent=$recent budget=$budget"

          # Single-task override bypasses cap
          if [ -n "$ONLY_TASK" ]; then
            matrix=$(jq -c --arg t "$ONLY_TASK" --slurpfile c "$cfg" \
              '{include:[{task:$t, model:$c[0].model, max_turns:$c[0].max_turns}]}' <<< '{}')
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "empty=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sel='[]'
          for f in $(ls .tasks/*.md 2>/dev/null | sort); do
            name=$(basename "$f" .md)

            # Skip: in-flight (open PR with matching title prefix)
            open=$(gh pr list --label nightshift --state open \
                     --search "\"[task:${name}]\" in:title" --json number --jq 'length')
            [ "$open" -gt 0 ] && { echo "skip $name: open PR"; continue; }

            # Skip: parked (closed-unmerged count >= max_nights_before_parking)
            closed=$(gh pr list --label nightshift --state closed \
                       --search "\"[task:${name}]\" in:title" \
                       --json number,mergedAt --jq '[.[] | select(.mergedAt == null)] | length')
            if [ "$closed" -ge "$park" ]; then
              echo "skip $name: parked ($closed closed-unmerged >= $park)"
              # File/refresh parking issue
              existing=$(gh issue list --label nightshift --state open \
                           --search "\"[parked] $name\" in:title" --json number --jq 'length')
              if [ "$existing" -eq 0 ]; then
                gh issue create \
                  --title "[parked] $name" \
                  --label nightshift \
                  --body "Task \`.tasks/$name.md\` has been closed-unmerged $closed times (threshold: $park). Please revise or remove the spec."
              fi
              continue
            fi

            # Skip: blocked (after: dependency file still exists on main; evergreen deps never block)
            dep=$(grep -m1 '^after:' "$f" | awk '{print $2}' || true)
            if [ -n "$dep" ] && [ -f ".tasks/$dep" ]; then
              dep_base=$(basename "$dep" .md)
              is_evergreen=$(jq -r --arg t "$dep_base" '.evergreen_tasks | index($t) != null' "$cfg")
              if [ "$is_evergreen" != "true" ]; then
                echo "skip $name: blocked on $dep"
                continue
              fi
            fi

            sel=$(jq -c --arg t "$name" '. + [$t]' <<< "$sel")
          done

          matrix=$(jq -c --argjson b "$budget" --slurpfile c "$cfg" \
            '{include:(.[:$b] | map({task:., model:$c[0].model, max_turns:$c[0].max_turns}))}' <<< "$sel")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "empty=$(jq -r '.include | length == 0' <<< "$matrix")" >> "$GITHUB_OUTPUT"

  run:
    needs: plan
    if: needs.plan.outputs.empty != 'true'
    strategy:
      max-parallel: 1
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # GITHUB_TOKEN pushes/PRs put downstream pull_request CI in "awaiting approval".
      # Mint a GitHub App installation token so pytest/bazel/pyright/etc. run automatically.
      - name: Mint nightshift bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NIGHTSHIFT_APP_ID }}
          private-key: ${{ secrets.NIGHTSHIFT_APP_PRIVATE_KEY }}

      - name: Load task prompt with interpolation
        id: prompt
        env:
          TASK: ${{ matrix.task }}
        run: |
          {
            echo 'text<<EOF'
            echo "Your task file is: .tasks/${TASK}.md"
            echo "The TASK variable is: ${TASK}"
            echo ""
            cat tools/nightshift/nightshift.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1.0.144
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: ${{ steps.prompt.outputs.text }}
          show_full_output: true
          claude_args: |
            --model ${{ matrix.model }}
            --max-turns ${{ matrix.max_turns }}
            --allowedTools "Bash,Edit,MultiEdit,Write,Read,Glob,Grep,LS"
